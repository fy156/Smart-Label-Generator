<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>智能标签生成器 - UE数字孪生艺术科技版</title>
  <!--
  ================================================================================
  修复汇总 (Fixes Summary)
  ================================================================================
  
  [修复1] 导入Excel功能 - 2026-03-26
  问题: 打包后导入弹出两次选择框，提示 "XLSX.read is not a function"
  修复: 
    - 新增 importExcel() 函数分离 Electron/浏览器路径
    - Electron环境直接调用 IPC (open-file)
    - 浏览器环境才触发 file input
    - 修改按钮 onclick="importExcel()"
  
  [修复2] 批量导出标签(JSON/CIM格式) - 2026-03-26
  问题: 打包后导出失败，无错误提示
  修复:
    - JSON格式导出添加 IPC 支持 (save-file)
    - CIM格式导出添加 IPC 支持
    - 使用 TextEncoder 将 JSON 转为 Uint8Array
    - 浏览器环境保持原有 link.click() 方式
  
  [修复3] 导出示例数据 - 2026-03-26
  问题: 选择示例数据后无法导出Excel
  修复:
    - exportSampleData() 改为 async 函数
    - Electron环境使用 XLSX.write() + IPC
    - 浏览器环境保持 XLSX.writeFile()
  
  [修复4] 下载模板 - 2026-03-26
  修复:
    - downloadTemplate() 改为 async 函数
    - Electron环境使用 XLSX.write() + IPC
    - 浏览器环境保持 XLSX.writeFile()
  
  [修复5] XLSX 库本地离线化 - 2026-03-28
  问题: GitHub Actions 打包后 XLSX 库加载失败 (CDN 网络问题)
  修复:
    - 下载 xlsx.full.min.js 到 src/lib/ 目录
    - 修改引用路径为本地路径 lib/xlsx.full.min.js
    - 避免打包后网络加载失败问题
  
  [修复6] 批量导出图片（PNG/JPG/BMP/TGA）- 2026-03-28
  问题: 打包后批量导出图片失败 (link.click() 被阻止)
  修复:
    - 添加 Electron IPC 支持 (save-file)
    - 将 Blob 转为 ArrayBuffer 再转为数组传输
    - 浏览器环境保持原有 link.click() 方式
  
  [修复7] 强制 XLSX 挂载到 window（方案A）- 2026-03-28
  问题: 打包后 XLSX.read is not a function（nodeIntegration 冲突）
  根因: Electron nodeIntegration: true 时，XLSX 导出为 module.exports 而非 window.XLSX
  修复:
    - 在 XLSX 脚本后添加代码，检测 XLSX 是否定义
    - 未定义时使用 require('./lib/xlsx.full.min.js') 强制挂载到 window.XLSX
    - 确保渲染进程代码中 XLSX 全局可用
  
  [修复8] 主进程处理 Excel（方案B）- 2026-03-28
  问题: Mac DMG 打包后路径问题导致 XLSX 加载失败
  根因: Electron 打包后 require('./lib/') 路径解析失败
  修复:
    - 安装 xlsx npm 包到主进程
    - 添加 IPC: 'open-file'（主进程解析 Excel 返回 JSON）
    - 添加 IPC: 'export-excel'（主进程生成 Excel 文件）
    - 渲染进程不再直接调用 XLSX，全部通过 IPC 与主进程通信
    - 浏览器环境保持原有 XLSX 调用方式
  
  ================================================================================
  -->
  <!-- XLSX 库本地离线化，避免打包后网络加载失败 -->
  <script src="lib/xlsx.full.min.js"></script>
  <script>
    // 强制 XLSX 挂载到 window（解决 Electron nodeIntegration 问题）
    // 当 nodeIntegration: true 时，XLSX 会导出为 module.exports 而不是 window.XLSX
    if (typeof XLSX === 'undefined' && typeof require !== 'undefined') {
      try {
        window.XLSX = require('./lib/xlsx.full.min.js');
      } catch (e) {
        console.error('XLSX 加载失败:', e);
      }
    } else if (typeof XLSX !== 'undefined') {
      window.XLSX = XLSX;
    }
  </script>
  <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: #0a0a0f;
      color: #fff;
      min-height: 100vh;
    }

    .header {
      position: sticky;
      top: 0;
      z-index: 50;
      background: rgba(10, 10, 15, 0.95);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    .header-content {
      max-width: 1600px;
      margin: 0 auto;
      padding: 16px 24px;
    }

    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-icon {
      width: 40px;
      height: 40px;
      border-radius: 8px;
      background: linear-gradient(135deg, #5aaaff, #00d4aa);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }

    .logo-text h1 {
      font-size: 18px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 2px;
    }

    .logo-text p {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.5);
    }

    .controls {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
      border: none;
      outline: none;
    }

    .btn-primary {
      background: rgba(0, 212, 170, 0.2);
      color: #00d4aa;
      border: 1px solid rgba(0, 212, 170, 0.3);
    }
    .btn-primary:hover { background: rgba(0, 212, 170, 0.3); }

    .btn-secondary {
      background: rgba(90, 170, 255, 0.2);
      color: #5aaaff;
      border: 1px solid rgba(90, 170, 255, 0.3);
    }
    .btn-secondary:hover:not(:disabled) { background: rgba(90, 170, 255, 0.3); }

    .btn-outline {
      background: transparent;
      color: rgba(255, 255, 255, 0.7);
      border: 1px solid rgba(255, 255, 255, 0.2);
    }
    .btn-outline:hover:not(:disabled) { background: rgba(255, 255, 255, 0.1); }

    .btn-ghost {
      background: transparent;
      color: rgba(255, 255, 255, 0.5);
      border: none;
    }
    .btn-ghost:hover { color: rgba(255, 255, 255, 0.7); }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn svg { width: 16px; height: 16px; }

    .export-options {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    .font-settings-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .font-settings-wrap label {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.5);
    }

    .font-family-select, .font-color-input {
      padding: 6px 12px;
      border-radius: 4px;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: #fff;
      font-size: 13px;
      cursor: pointer;
      outline: none;
    }

    .font-family-select option {
      background: #1a1a2e;
    }

    .font-color-input {
      width: 50px;
      height: 32px;
      padding: 2px;
      cursor: pointer;
    }

    .font-glow-toggle {
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.7);
    }

    .font-glow-toggle input[type="checkbox"] {
      width: 16px;
      height: 16px;
      accent-color: #5aaaff;
    }

    .font-glow-intensity {
      width: 80px;
      height: 4px;
      -webkit-appearance: none;
      appearance: none;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 2px;
      outline: none;
    }

    .font-glow-intensity::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #5aaaff;
      cursor: pointer;
    }

    .font-glow-intensity::-moz-range-thumb {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #5aaaff;
      cursor: pointer;
      border: none;
    }

    .font-glow-intensity:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .bg-toggle {
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.7);
    }
    .bg-toggle input[type="checkbox"] {
      width: 16px;
      height: 16px;
      accent-color: #5aaaff;
    }

    /* 无背景样式 */
    .tag-container.no-bg .tech-tag {
      background: transparent !important;
      border-color: rgba(var(--r), var(--g), var(--b), 0.8) !important;
    }

    .white-text-toggle {
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.7);
    }
    .white-text-toggle input[type="checkbox"] {
      width: 16px;
      height: 16px;
      accent-color: #5aaaff;
    }

    /* 白色字体样式 */
    .tag-container.white-text .tag-text {
      color: #ffffff !important;
    }

    .export-format, .style-select-wrap, .res-select-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .export-format label, .style-select-wrap label, .res-select-wrap label {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.5);
    }

    .format-select, .style-select, .res-select {
      padding: 6px 12px;
      border-radius: 4px;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: #fff;
      font-size: 13px;
      cursor: pointer;
      outline: none;
    }

    .format-select option, .style-select option, .res-select option {
      background: #1a1a2e;
    }

    .stats {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
      display: flex;
      align-items: center;
      gap: 24px;
      font-size: 13px;
      flex-wrap: wrap;
    }

    .stats-count { color: rgba(255, 255, 255, 0.5); }
    .stats-count span { color: #fff; font-weight: 500; }

    .stats-types {
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    .stat-type {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .stat-type-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }

    .stat-type-name { color: rgba(255, 255, 255, 0.7); }
    .stat-type-count { color: rgba(255, 255, 255, 0.4); }

    .main {
      max-width: 1600px;
      margin: 0 auto;
      padding: 32px 24px;
    }

    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 96px 24px;
      text-align: center;
    }

    .empty-icon {
      width: 96px;
      height: 96px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.05);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      margin-bottom: 24px;
      opacity: 0.5;
    }

    .empty-title {
      font-size: 16px;
      font-weight: 500;
      color: rgba(255, 255, 255, 0.8);
      margin-bottom: 8px;
    }

    .empty-desc {
      font-size: 13px;
      color: rgba(255, 255, 255, 0.5);
      margin-bottom: 24px;
      max-width: 400px;
    }

    .empty-actions {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .tags-grid {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 60px;
      padding: 20px;
    }

    .tag-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .tag-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
      animation: tagIn 0.4s ease backwards;
    }

    @keyframes tagIn {
      from { opacity: 0; transform: translateY(20px) scale(0.95); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* ========== 基础标签结构 ========== */
    .tech-tag {
      width: 35px;
      min-height: 60px;
      height: auto;      /* 高度自适应 */
      max-height: none;  /* 取消最大高度限制 */
      padding: 10px 3px;
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .tag-icon-wrap {
      width: 20px;  /* 从24px减小 */
      height: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 6px;
      position: relative;
      font-size: 14px;
      line-height: 1;
    }

    .tag-text {
      writing-mode: vertical-rl;
      text-orientation: upright;
      -webkit-text-orientation: upright;
      font-size: 11px;
      line-height: 1.8;
      letter-spacing: 0.2em;
      text-align: center;
      margin: 0 auto;
      font-weight: 400;
      /* 保留用户字体设置功能 */
      font-family: var(--tag-font-family, -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', 'PingFang SC', sans-serif);
      /* 全角字符确保拉丁字符与中文中线对齐 */
      font-variant-east-asian: full-width;
      /* 布局：使用 block 而非 flex，避免干扰字符自然对齐 */
      display: block;
      padding: 10px 4px;
      height: auto;
      min-height: 40px;
      overflow-wrap: break-word;
    }

    .tag-text.glow {
      text-shadow: 0 0 var(--tag-glow-intensity, 5px) currentColor;
    }

    /* 定位点容器 */
    .location-pin {
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
      margin-top: -2px;
    }

    .pin-neck {
      width: 3px;
      height: 30px;
      position: relative;
    }

    .ripple-point {
      width: 40px;
      height: 40px;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .pin-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      position: relative;
      z-index: 10;
    }

    /* 导出按钮 */
    .tag-actions {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .tag-btn {
      padding: 4px 10px;
      font-size: 10px;
      font-weight: 500;
      border-radius: 4px;
      background: rgba(255, 255, 255, 0.08);
      color: rgba(255, 255, 255, 0.6);
      border: 1px solid rgba(255, 255, 255, 0.1);
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .tag-btn:hover {
      background: rgba(255, 255, 255, 0.15);
      color: #fff;
    }

    /* ========== 20种扁平化风格 ========== */
    
    /* 风格1: 3D立体方块 - 扁平化 */
    .style-cube3d .tech-tag {
      background: rgba(var(--r), var(--g), var(--b), 1);
      border: 1px solid rgba(255, 255, 255, 0.8);
      border-radius: 4px;
    }
    .style-cube3d .tag-icon-wrap {
      background: rgba(255, 255, 255, 0.8);
      border: 1px solid rgba(255, 255, 255, 0.6);
      border-radius: 4px;
    }
    .style-cube3d .tag-text { 
      color: #ffffff;
      font-weight: bold;
      /* 移除强制字体设置，继承基础样式，保留用户字体选择功能 */
    }
    .style-cube3d .pin-neck { 
      background: rgba(var(--r), var(--g), var(--b), 1);
      width: 1px;
    }
    .style-cube3d .pin-dot { background: rgba(var(--r), var(--g), var(--b), 1); }

    /* 风格2: 斜面浮雕 - 扁平化 */
    .style-bevel .tech-tag {
      background: rgba(var(--r), var(--g), var(--b), 0.15);
      border: 2px solid rgba(var(--r), var(--g), var(--b), 0.5);
      border-radius: 8px;
    }
    .style-bevel .tag-icon-wrap {
      background: rgba(var(--r), var(--g), var(--b), 0.2);
      border-radius: 6px;
    }
    .style-bevel .tag-text { color: rgba(var(--r), var(--g), var(--b), 1); }
    .style-bevel .pin-neck { background: rgba(var(--r), var(--g), var(--b), 0.7); }
    .style-bevel .pin-dot { background: rgba(var(--r), var(--g), var(--b), 1); }

    /* 风格3: 悬浮卡片 - 扁平化 */
    .style-float .tech-tag {
      background: rgba(var(--r), var(--g), var(--b), 0.15);
      border: 1px solid rgba(var(--r), var(--g), var(--b), 0.5);
      border-radius: 10px;
    }
    .style-float .tag-icon-wrap {
      background: rgba(var(--r), var(--g), var(--b), 0.2);
      border-radius: 8px;
    }
    .style-float .tag-text { color: rgba(var(--r), var(--g), var(--b), 1); }
    .style-float .pin-neck { background: rgba(var(--r), var(--g), var(--b), 0.5); }
    .style-float .pin-dot { background: rgba(var(--r), var(--g), var(--b), 1); }

    /* 风格4: 层叠立体 - 扁平化 */
    .style-layer .tech-tag {
      background: rgba(var(--r), var(--g), var(--b), 0.15);
      border: 2px solid rgba(var(--r), var(--g), var(--b), 0.5);
      border-radius: 6px;
    }
    .style-layer .tag-icon-wrap {
      background: rgba(var(--r), var(--g), var(--b), 0.25);
      border: 1px solid rgba(var(--r), var(--g), var(--b), 0.4);
      border-radius: 4px;
    }
    .style-layer .tag-text { color: rgba(var(--r), var(--g), var(--b), 1); }
    .style-layer .pin-neck { background: rgba(var(--r), var(--g), var(--b), 0.6); }
    .style-layer .pin-dot { background: rgba(var(--r), var(--g), var(--b), 1); }

    /* 风格5: 内凹立体 - 扁平化 */
    .style-inset .tech-tag {
      background: rgba(var(--r), var(--g), var(--b), 0.12);
      border: 2px solid rgba(var(--r), var(--g), var(--b), 0.4);
      border-radius: 8px;
    }
    .style-inset .tag-icon-wrap {
      background: rgba(var(--r), var(--g), var(--b), 0.15);
      border-radius: 6px;
    }
    .style-inset .tag-text { color: rgba(var(--r), var(--g), var(--b), 0.9); }
    .style-inset .pin-neck { background: rgba(var(--r), var(--g), var(--b), 0.5); }
    .style-inset .pin-dot { background: rgba(var(--r), var(--g), var(--b), 0.8); }

    /* 风格6: 外凸立体 - 扁平化 */
    .style-raised .tech-tag {
      background: rgba(var(--r), var(--g), var(--b), 0.2);
      border: 2px solid rgba(var(--r), var(--g), var(--b), 0.5);
      border-radius: 10px;
    }
    .style-raised .tag-icon-wrap {
      background: rgba(var(--r), var(--g), var(--b), 0.25);
      border-radius: 8px;
    }
    .style-raised .tag-text { color: rgba(var(--r), var(--g), var(--b), 1); }
    .style-raised .pin-neck { background: rgba(var(--r), var(--g), var(--b), 0.6); }
    .style-raised .pin-dot { background: rgba(var(--r), var(--g), var(--b), 1); }

    /* 风格7: 倒角金属 - 扁平化（简化圆角） */
    .style-chamfer .tech-tag {
      background: rgba(var(--r), var(--g), var(--b), 0.15);
      border: 2px solid rgba(var(--r), var(--g), var(--b), 0.5);
      border-radius: 8px;
    }
    .style-chamfer .tag-icon-wrap {
      background: rgba(var(--r), var(--g), var(--b), 0.25);
      border-radius: 6px;
    }
    .style-chamfer .tag-text { color: rgba(var(--r), var(--g), var(--b), 1); }
    .style-chamfer .pin-neck { background: rgba(var(--r), var(--g), var(--b), 0.7); }
    .style-chamfer .pin-dot { background: rgba(var(--r), var(--g), var(--b), 1); }

    /* 风格8: 双边框立体 - 扁平化 */
    .style-double .tech-tag {
      background: rgba(var(--r), var(--g), var(--b), 0.12);
      border: 3px solid rgba(var(--r), var(--g), var(--b), 0.6);
      border-radius: 4px;
    }

    .type-食品加工厂 { --r: 240; --g: 180; --b: 100; --r2: 255; --g2: 220; --b2: 150; }

    .type-矿山 { --r: 160; --g: 140; --b: 120; --r2: 200; --g2: 180; --b2: 160; }

    .type-水库 { --r: 0; --g: 170; --b: 210; --r2: 50; --g2: 210; --b2: 250; }

    .type-瀑布 { --r: 80; --g: 200; --b: 240; --r2: 130; --g2: 240; --b2: 255; }
    .type-泉水 { --r: 100; --g: 210; --b: 250; --r2: 150; --g2: 250; --b2: 255; }
    .type-冰川 { --r: 150; --g: 220; --b: 255; --r2: 200; --g2: 255; --b2: 255; }
    .type-湿地 { --r: 80; --g: 180; --b: 160; --r2: 130; --g2: 220; --b2: 200; }
    .type-海岸线 { --r: 0; --g: 200; --b: 230; --r2: 50; --g2: 240; --b2: 255; }
    .type-礁石 { --r: 140; --g: 160; --b: 180; --r2: 190; --g2: 200; --b2: 220; }

    /* 默认 */
    .type-POI { --r: 200; --g: 200; --b: 200; --r2: 230; --g2: 230; --b2: 230; }

    /* Toast */
    .toast-container {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1000;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .toast {
      background: rgba(20, 20, 30, 0.95);
      border: 1px solid rgba(90, 170, 255, 0.3);
      border-radius: 8px;
      padding: 12px 24px;
      color: #fff;
      font-size: 14px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(10px);
      animation: toastIn 0.3s ease, toastOut 0.3s ease 1.7s forwards;
    }

    /* 进度条 */
    .progress-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.7);
      z-index: 2000;
      display: none;
      align-items: center;
      justify-content: center;
    }

    .progress-overlay.active {
      display: flex;
    }

    .progress-box {
      background: rgba(20, 20, 30, 0.95);
      border: 1px solid rgba(90, 170, 255, 0.3);
      border-radius: 12px;
      padding: 32px 48px;
      min-width: 400px;
      text-align: center;
    }

    .progress-title {
      font-size: 18px;
      color: #fff;
      margin-bottom: 8px;
    }

    .progress-status {
      font-size: 14px;
      color: rgba(255, 255, 255, 0.7);
      margin-bottom: 24px;
    }

    .progress-bar-bg {
      width: 100%;
      height: 8px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 4px;
      overflow: hidden;
      margin-bottom: 12px;
    }

    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #00d4aa, #5aaaff);
      border-radius: 4px;
      transition: width 0.3s ease;
      width: 0%;
    }

    .progress-text {
      font-size: 14px;
      color: #5aaaff;
    }

    @keyframes toastIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes toastOut {
      from { opacity: 1; transform: translateY(0); }
      to { opacity: 0; transform: translateY(-10px); }
    }

    .ue-tips {
      margin-top: 12px;
      padding: 12px 16px;
      background: rgba(90, 170, 255, 0.1);
      border: 1px solid rgba(90, 170, 255, 0.2);
      border-radius: 8px;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.7);
      line-height: 1.6;
    }

    .ue-tips strong { color: #5aaaff; }
    .ue-tips code {
      background: rgba(255, 255, 255, 0.1);
      padding: 2px 6px;
      border-radius: 3px;
      font-family: monospace;
      color: #00d4aa;
    }

    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }

    ::-webkit-scrollbar-track {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(90, 170, 255, 0.3);
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: rgba(90, 170, 255, 0.5);
    }

    @media (max-width: 640px) {
      .header-content { padding: 12px 16px; }
      .header-top { flex-direction: column; align-items: flex-start; }
      .controls { width: 100%; justify-content: flex-start; }
      .btn { padding: 6px 12px; font-size: 12px; }
      .main { padding: 20px 16px; }
      .tags-grid { gap: 40px; }
    }
  </style>
</head>

    // 验证并转换 Excel JSON 数据
    function validateAndConvertExcelData(jsonData) {
      if (jsonData.length === 0) {
        showToast('Excel 文件为空');
        return null;
      }

      const firstRow = jsonData[0];
      if (!('标签名称' in firstRow) || !('类型' in firstRow)) {
        showToast('Excel 格式错误：需要包含「标签名称」和「类型」列');
        return null;
      }

      const newTags = jsonData.map((row, index) => ({
        标签名称: String(row['标签名称'] || ''),
        类型: String(row['类型'] || ''),
        id: `${Date.now()}-${index}`,
      })).filter(tag => tag.标签名称 && tag.类型);

      return newTags;
    }

    // 解析 Excel 数据（浏览器环境使用）
    function parseExcelData(dataArray) {
      const data = new Uint8Array(dataArray);
      const workbook = XLSX.read(data, { type: 'array' });
      const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
      const jsonData = XLSX.utils.sheet_to_json(firstSheet);
      return validateAndConvertExcelData(jsonData);
    }

    // 导入 Excel 主函数（Electron/浏览器自动适配）
    async function importExcel() {
      // Electron 环境使用 IPC（主进程处理 XLSX）
      if (window.require) {
        try {
          const { ipcRenderer } = window.require('electron');
          const result = await ipcRenderer.invoke('open-file', {
            filters: [{ name: 'Excel 文件', extensions: ['xlsx', 'xls'] }]
          });
          if (result.success) {
            // 主进程已返回解析后的 JSON 数据
            const newTags = validateAndConvertExcelData(result.data);
            if (newTags) {
              tags = newTags;
              currentSampleType = '';
              renderTags();
              showToast(`成功导入 ${tags.length} 个标签`);
            }
          } else if (result.error) {
            showToast('导入失败: ' + result.error);
          }
        } catch (err) {
          showToast('导入失败: ' + err.message);
        }
        return;
      }
      
      // 浏览器环境：触发 file input
      document.getElementById('fileInput').click();
    }

      const reader = new FileReader();

          if (newTags) {
            tags = newTags;
            currentSampleType = '';
            renderTags();
            showToast(`成功导入 ${tags.length} 个标签`);
          }
        } catch (error) {

    async function canvasToJPG(canvas) {

    function canvasToTGA(canvas) {
      const ctx = canvas.getContext('2d');
      const width = canvas.width;
      const height = canvas.height;
      
      const imageData = ctx.getImageData(0, 0, width, height);
      const data = imageData.data;
      
      const header = new Uint8Array(18);
      header[0] = 0; header[1] = 0; header[2] = 2;
      header[3] = 0; header[4] = 0; header[5] = 0; header[6] = 0;
      header[7] = 0; header[8] = 0; header[9] = 0; header[10] = 0;
      header[11] = 0; header[12] = width & 0xFF; header[13] = (width >> 8) & 0xFF;
      header[14] = 0; header[15] = height & 0xFF; header[16] = (height >> 8) & 0xFF;
      header[17] = 32; header[17] |= 0x08;
      
      const pixelData = new Uint8Array(width * height * 4);
      let offset = 0;
      
      for (let y = height - 1; y >= 0; y--) {
        for (let x = 0; x < width; x++) {
          const i = (y * width + x) * 4;
          pixelData[offset++] = data[i + 2];
          pixelData[offset++] = data[i + 1];
          pixelData[offset++] = data[i];
          pixelData[offset++] = data[i + 3];
        }
      }
      
      const footer = new Uint8Array(26);
      footer[8] = 0x54; footer[9] = 0x52; footer[10] = 0x55; footer[11] = 0x45;
      footer[12] = 0x56; footer[13] = 0x49; footer[14] = 0x53; footer[15] = 0x49;
      footer[16] = 0x4F; footer[17] = 0x4E; footer[18] = 0x2D; footer[19] = 0x58;
      footer[20] = 0x46; footer[21] = 0x49; footer[22] = 0x4C; footer[23] = 0x45;
      footer[24] = 0x2E; footer[25] = 0x00;
      
      return new Blob([header, pixelData, footer], { type: 'image/tga' });
    }

    function canvasToBMP(canvas) {
      const ctx = canvas.getContext('2d');
      const width = canvas.width;
      const height = canvas.height;
      
      const imageData = ctx.getImageData(0, 0, width, height);
      const data = imageData.data;
      
      const fileHeaderSize = 14;
      const dibHeaderSize = 40;
      const rowSize = Math.ceil((width * 3) / 4) * 4;
      const pixelDataSize = rowSize * height;
      const fileSize = fileHeaderSize + dibHeaderSize + pixelDataSize;
      
      const buffer = new ArrayBuffer(fileSize);
      const view = new DataView(buffer);
      const bytes = new Uint8Array(buffer);
      
      view.setUint8(0, 0x42); view.setUint8(1, 0x4D);
      view.setUint32(2, fileSize, true);
      view.setUint32(6, 0, true);
      view.setUint32(10, fileHeaderSize + dibHeaderSize, true);
      
      view.setUint32(14, dibHeaderSize, true);
      view.setInt32(18, width, true);
      view.setInt32(22, height, true);
      view.setUint16(26, 1, true);
      view.setUint16(28, 24, true);
      view.setUint32(30, 0, true);
      view.setUint32(34, pixelDataSize, true);
      view.setInt32(38, 2835, true);
      view.setInt32(42, 2835, true);
      view.setUint32(46, 0, true);
      view.setUint32(50, 0, true);
      
      let offset = fileHeaderSize + dibHeaderSize;
      for (let y = height - 1; y >= 0; y--) {
        for (let x = 0; x < width; x++) {
          const pixelIndex = (y * width + x) * 4;
          const a = data[pixelIndex + 3] / 255;
          bytes[offset++] = Math.round(data[pixelIndex + 2] * a);
          bytes[offset++] = Math.round(data[pixelIndex + 1] * a);
          bytes[offset++] = Math.round(data[pixelIndex] * a);
        }
        const padding = rowSize - (width * 3);
        for (let p = 0; p < padding; p++) bytes[offset++] = 0;
      }
      
      return new Blob([buffer], { type: 'image/bmp' });
    }

    // 判断图标是否为"字"（非emoji，需要特殊样式）
    function isTextIcon(icon) {
      if (!icon || icon.length === 0) return false;
      // 如果图标长度为1且是基本ASCII字符或常见汉字，认为是"字"
      // emoji通常长度大于1或是特殊unicode字符
      const code = icon.charCodeAt(0);
      // 检查是否是emoji（简单判断：如果包含 surrogate pairs 或长度大于1）
      const hasSurrogate = /[\uD800-\uDFFF]/.test(icon);
      return !hasSurrogate && icon.length === 1 && (code < 0x2600 || code > 0x27BF);
    }

    async function exportTag(id, format) {
      if (isExporting) {
        showToast('正在导出中，请稍候...');
        return;
      }

      const tagElement = document.getElementById(`tag-${id}`);
      if (!tagElement) {
        showToast('标签元素未找到');
        return;
      }

      const tag = tags.find(t => t.id === id);
      if (!tag) return;

      isExporting = true;
      const resScale = parseInt(document.getElementById('resSelect').value);

      try {
        tagElement.style.transform = 'none';
        
        const canvas = await html2canvas(tagElement, {
          backgroundColor: null,
          scale: resScale,
          useCORS: true,
          allowTaint: true,
          logging: false,
          removeContainer: true,
          onclone: function(clonedDoc) {
            const clonedElement = clonedDoc.getElementById(`tag-${id}`);
            if (clonedElement) {
              clonedElement.style.animation = 'none';
              clonedElement.style.transform = 'none';
              // 修复 html2canvas 导出时数字/字母左偏移，同时保持中线对齐
              const tagText = clonedElement.querySelector('.tag-text');
              if (tagText) {
                // 移除导致偏移的 full-width
                tagText.style.fontVariantEastAsian = 'normal';
                // 所有字符统一用等宽 span 包裹，实现完美中线对齐
                const text = tagText.textContent;
                const chars = text.split('');
                const escapeHtml = (char) => {
                  const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
                  return map[char] || char;
                };
                tagText.innerHTML = chars.map(c => 
                  `<span style="display:inline-block;width:1em;text-align:center;">${escapeHtml(c)}</span>`
                ).join('');
              }
            }
          }
        });

        tagElement.style.transform = '';

        let blob, ext;
        switch (format) {
          case 'tga':
            blob = canvasToTGA(canvas);
            ext = 'tga';
            break;
          case 'png':
            blob = await canvasToPNG(canvas);
            ext = 'png';
            break;
          case 'bmp':
            blob = canvasToBMP(canvas);
            ext = 'bmp';
            break;
          case 'jpg':
            blob = await canvasToJPG(canvas);
            ext = 'jpg';
            break;
          case 'json':
            const tagIndex = tags.findIndex(t => t.id === id);
            blob = await exportTagToJSON(tag, tagIndex);
            ext = 'json';
            break;
          case 'cim':
            const cimIndex = tags.findIndex(t => t.id === id);
            blob = await exportTagToCIMJSON(tag, cimIndex);
            ext = 'json';
            break;
          default:
            blob = canvasToTGA(canvas);
            ext = 'tga';
        }

        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.href = url;
        link.download = `${tag.标签名称}_标签.${ext}`;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        URL.revokeObjectURL(url);

        showToast(`已导出: ${tag.标签名称}_标签.${ext}`);
      } catch (error) {
        showToast('导出失败');
        console.error(error);
      } finally {
        isExporting = false;
      }
    }

    async function exportAllTags() {
      if (tags.length === 0) {
        showToast('没有可导出的标签');
        return;
      }

      if (isExporting) {
        showToast('正在导出中，请稍候...');
        return;
      }

      const format = document.getElementById('exportFormat').value;
      const exportScope = document.getElementById('exportScope').value;
      
      // 根据导出范围筛选标签
      let tagsToExport = tags;
      let exportTypeName = '';
      
      console.log(`[批量导出] 导出范围: ${exportScope}, 总标签数: ${tags.length}`);
      console.log(`[批量导出] 标签类型分布:`, tags.reduce((acc, tag) => {
        const cat = getTagCategory(tag) || '未分类';
        acc[cat] = (acc[cat] || 0) + 1;
        return acc;
      }, {}));
      
      if (exportScope !== 'all') {
        tagsToExport = tags.filter(tag => getTagCategory(tag) === exportScope);
        exportTypeName = categoryNames[exportScope];
        console.log(`[批量导出] 筛选后标签数: ${tagsToExport.length}, 类型: ${exportTypeName}`);
        if (tagsToExport.length === 0) {
          showToast(`没有${exportTypeName}类型的标签可导出`);
          return;
        }
      }
      
      // 提前获取 Electron API（如果可用）
      const electronAPI = window.require ? window.require('electron') : null;
      const ipcRenderer = electronAPI ? electronAPI.ipcRenderer : null;
      const isElectron = !!ipcRenderer;
      
      console.log(`[批量导出] 环境检测: isElectron=${isElectron}`);
      
      // 所有格式导出前，先选择保存路径（Electron环境）
      let folderPath = null;
      
      if (isElectron) {
        try {
          const folderResult = await ipcRenderer.invoke('select-folder');
          console.log(`[批量导出] 选择文件夹结果:`, folderResult);
          if (!folderResult.success) {
            showToast('已取消导出');
            return;
          }
          folderPath = folderResult.folderPath;
          showToast(`📁 已选择保存路径: ${folderPath}`, 3000);
        } catch (err) {
          console.error(`[批量导出] 选择文件夹失败:`, err);
          showToast('选择文件夹失败: ' + err.message);
          return;
        }
      } else {
        console.log(`[批量导出] 浏览器环境，使用单独下载`);
      }
      
      isExporting = true;
      
      // JSON格式特殊处理：合并所有标签到一个文件
      if (format === 'json') {
        showToast('正在生成合并JSON文件...');
        
        try {
          const allLabels = [];
          for (let i = 0; i < tagsToExport.length; i++) {
            const tag = tagsToExport[i];
            const jsonData = buildTagJSON(tag, i);
            const labelData = jsonData.vertical_label_adapted;
            
            // 检查icon是否为"字"，如果是则添加白色加粗样式
            const icon = getIcon(tag.类型);
            if (isTextIcon(icon)) {
              labelData.icon_style = {
                "color": "#ffffff",
                "font_weight": "bold",
                "font_size": 14
              };
            }
            
            // 从typeColors获取颜色，或使用默认灰色
            const colorHex = typeColors[tag.类型] || '#c8c8c8';
            
            // 解析hex颜色为rgb
            const r = parseInt(colorHex.slice(1, 3), 16) || 200;
            const g = parseInt(colorHex.slice(3, 5), 16) || 200;
            const b = parseInt(colorHex.slice(5, 7), 16) || 200;
            
            // 添加icon外框样式
            labelData.icon_frame = {
              "enabled": true,
              "width": 20,
              "height": 20,
              "background_color": `rgba(${r},${g},${b},0.2)`,
              "border_color": `rgba(${r},${g},${b},0.4)`,
              "border_width": 1,
              "border_radius": 4
            };
            
            allLabels.push(labelData);
          }
          
          const mergedJSON = {
            "version": "1.0",
            "type": "vertical_label_collection",
            "count": allLabels.length,
            "labels": allLabels,
            "meta": {
              "source": "智能标签生成器",
              "timestamp": new Date().toISOString()
            }
          };
          
          const jsonContent = JSON.stringify(mergedJSON, null, 2);
          const fileName = exportTypeName 
            ? `标签集合_${exportTypeName}_${allLabels.length}个.json`
            : `标签集合_${allLabels.length}个.json`;
          
          // Electron 环境使用 IPC 保存到指定文件夹
          if (window.require && ipcRenderer && folderPath) {
            try {
              const encoder = new TextEncoder();
              const data = encoder.encode(jsonContent);
              const result = await ipcRenderer.invoke('save-file', {
                data: Array.from(data),
                fileName: fileName,
                filters: [{ name: 'JSON 文件', extensions: ['json'] }],
                folderPath: folderPath
              });
              if (result.success) {
                showToast(`✅ 成功导出 ${allLabels.length} 个标签到:\n${folderPath}`, 5000);
              } else {
                showToast('导出失败: ' + (result.error || '未知错误'));
              }
            } catch (err) {
              showToast('导出失败: ' + err.message);
            }
          } else {
            // 浏览器环境使用下载链接
            const blob = new Blob([jsonContent], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = fileName;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
            showToast(`成功导出 ${allLabels.length} 个标签`);
          }
        } catch (error) {
          console.error('导出JSON失败:', error);
          showToast('导出JSON失败');
        }
        
        isExporting = false;
        return;
      }
      
      // CIM标准格式特殊处理：合并所有标签到一个文件
      if (format === 'cim') {
        showToast('正在生成CIM标准格式文件...');
        
        try {
          const allPOIs = [];
          for (let i = 0; i < tagsToExport.length; i++) {
            const tag = tagsToExport[i];
            const poiData = buildTagCIMJSON(tag, i);
            allPOIs.push(poiData);
          }
          
          const mergedJSON = {
            "pois": allPOIs
          };
          
          const jsonContent = JSON.stringify(mergedJSON, null, 2);
          const fileName = exportTypeName
            ? `CIM_POI集合_${exportTypeName}_${allPOIs.length}个.json`
            : `CIM_POI集合_${allPOIs.length}个.json`;
          
          // Electron 环境使用 IPC 保存到指定文件夹
          if (window.require && ipcRenderer && folderPath) {
            try {
              const encoder = new TextEncoder();
              const data = encoder.encode(jsonContent);
              const result = await ipcRenderer.invoke('save-file', {
                data: Array.from(data),
                fileName: fileName,
                filters: [{ name: 'JSON 文件', extensions: ['json'] }],
                folderPath: folderPath
              });
              if (result.success) {
                showToast(`✅ 成功导出 ${allPOIs.length} 个POI到:\n${folderPath}`, 5000);
              } else {
                showToast('导出失败: ' + (result.error || '未知错误'));
              }
            } catch (err) {
              showToast('导出失败: ' + err.message);
            }
          } else {
            // 浏览器环境使用下载链接
            const blob = new Blob([jsonContent], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = fileName;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
            showToast(`成功导出 ${allPOIs.length} 个POI`);
          }
        } catch (error) {
          console.error('导出CIM格式失败:', error);
          showToast('导出CIM格式失败');
        }
        
        isExporting = false;
        return;
      }
      
      // 显示进度条
      showProgress(
        exportTypeName ? `批量导出 ${exportTypeName}` : '批量导出全部',
        `准备导出 ${tagsToExport.length} 个标签...`
      );
      
      let successCount = 0;
      const resScale = parseInt(document.getElementById('resSelect').value);

      console.log(`[批量导出] 开始导出 ${tagsToExport.length} 个标签到 ${folderPath}`);

      // 收集所有图片文件（在 try 外部声明，以便在 finally 中访问）
      const imageFiles = [];
      
      try {
        for (let i = 0; i < tagsToExport.length; i++) {
          const tag = tagsToExport[i];
          const progress = ((i + 1) / tagsToExport.length) * 100;
          updateProgress(progress, `正在导出: ${tag.标签名称} (${i + 1}/${tagsToExport.length})`);
          console.log(`[批量导出] 处理第 ${i + 1}/${tagsToExport.length} 个: ${tag.标签名称}`);
          
          try {
            const tagElement = document.getElementById(`tag-${tag.id}`);
            if (!tagElement) {
              console.error(`[批量导出] 找不到元素: tag-${tag.id}`);
              continue;
            }

            // 滚动到可视区域确保元素可以被渲染
            tagElement.scrollIntoView({ behavior: 'instant', block: 'center' });
            
            // 等待一小段时间让渲染完成
            await new Promise(resolve => setTimeout(resolve, 50));

            tagElement.style.transform = 'none';
            
            const bgColor = format === 'jpg' ? '#FFFFFF' : null;
            console.log(`[批量导出] 渲染 canvas: ${tag.标签名称}`);
            
            const canvas = await html2canvas(tagElement, {
              backgroundColor: bgColor,
              scale: resScale,
              useCORS: true,
              allowTaint: true,
              logging: false,
              removeContainer: true,
              onclone: function(clonedDoc) {
                const clonedElement = clonedDoc.getElementById(`tag-${tag.id}`);
                if (clonedElement) {
                  clonedElement.style.animation = 'none';
                  clonedElement.style.transform = 'none';
                  // 修复 html2canvas 导出时数字/字母左偏移，同时保持中线对齐
                  const tagText = clonedElement.querySelector('.tag-text');
                  if (tagText) {
                    // 移除导致偏移的 full-width
                    tagText.style.fontVariantEastAsian = 'normal';
                    // 所有字符统一用等宽 span 包裹，实现完美中线对齐
                    const text = tagText.textContent;
                    const chars = text.split('');
                    const escapeHtml = (char) => {
                      const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
                      return map[char] || char;
                    };
                    tagText.innerHTML = chars.map(c => 
                      `<span style="display:inline-block;width:1em;text-align:center;">${escapeHtml(c)}</span>`
                    ).join('');
                  }
                }
              }
            });

            tagElement.style.transform = '';
            console.log(`[批量导出] Canvas 渲染完成: ${tag.标签名称}`);

            let blob;
            switch (format) {
              case 'tga': blob = canvasToTGA(canvas); break;
              case 'png': blob = await canvasToPNG(canvas); break;
              case 'bmp': blob = canvasToBMP(canvas); break;
              case 'jpg': blob = await canvasToJPG(canvas); break;
              default: blob = canvasToTGA(canvas);
            }
            console.log(`[批量导出] Blob 生成完成: ${tag.标签名称}, 大小: ${blob.size}`);

            // Electron 环境：收集图片到数组；浏览器环境：直接下载
            if (isElectron) {
              const arrayBuffer = await blob.arrayBuffer();
              const safeFileName = `${i + 1}_${tag.标签名称}_标签.${format}`.replace(/[<>:"\/\\|?*]/g, '_');
              imageFiles.push({
                name: safeFileName,
                buffer: Array.from(new Uint8Array(arrayBuffer))
              });
              successCount++;
            } else {
              // 浏览器环境
              const url = URL.createObjectURL(blob);
              const link = document.createElement('a');
              link.href = url;
              link.download = `${i + 1}_${tag.标签名称}_标签.${format}`;
              document.body.appendChild(link);
              link.click();
              document.body.removeChild(link);
              URL.revokeObjectURL(url);
              successCount++;
            }

            await new Promise(resolve => setTimeout(resolve, 100));
          } catch (error) {
            console.error(`[批量导出] ❌ 导出标签 ${tag.标签名称} 失败:`, error);
          }
        }
      
      // Electron 环境：生成 ZIP 压缩包
      if (isElectron && imageFiles.length > 0) {
        try {
          console.log(`[批量导出] 开始创建 ZIP，包含 ${imageFiles.length} 个文件`);
          showToast(`正在创建压缩包，请稍候...`, 5000);
          
          // 生成 ZIP 文件名：标签导出_2024-01-15_15-30-00.zip
          const now = new Date();
          const dateStr = now.toISOString().slice(0, 10);
          const timeStr = now.toTimeString().slice(0, 8).replace(/:/g, '-');
          const zipName = exportTypeName 
            ? `标签导出_${exportTypeName}_${dateStr}_${timeStr}.zip`
            : `标签导出_${dateStr}_${timeStr}.zip`;
          
          console.log(`[批量导出] 调用 create-zip: folderPath=${folderPath}, zipName=${zipName}`);
          
          const zipResult = await ipcRenderer.invoke('create-zip', {
            files: imageFiles,
            folderPath: folderPath,
            zipName: zipName
          });
          
          console.log(`[批量导出] create-zip 返回:`, zipResult);
          
          if (zipResult.success) {
            const sizeMB = (zipResult.size / 1024 / 1024).toFixed(2);
            console.log(`[批量导出] ✅ ZIP 创建成功: ${zipResult.filePath}, 大小: ${sizeMB} MB`);
            showToast(`✅ 导出完成!\n${imageFiles.length} 个标签已压缩\n大小: ${sizeMB} MB\n路径: ${zipResult.filePath}`, 10000);
          } else {
            console.error(`[批量导出] ❌ ZIP 创建失败: ${zipResult.error}`);
            showToast(`⚠️ 压缩失败: ${zipResult.error}`, 5000);
          }
        } catch (err) {
          console.error(`[批量导出] ❌ 创建 ZIP 异常:`, err);
          showToast(`⚠️ 压缩异常: ${err.message}`, 5000);
        }
      } else {
        console.log(`[批量导出] 跳过ZIP: isElectron=${isElectron}, imageFiles.length=${imageFiles.length}`);
      }

      } catch (error) {
        console.error('[批量导出] 导出过程出错:', error);
        showToast('导出过程出错: ' + error.message);
      } finally {
        // 隐藏进度条
        hideProgress();
      }
      
      isExporting = false;
      console.log(`[批量导出] 完成: ${successCount}/${tagsToExport.length}`);
      
      // 浏览器环境显示完成提示（Electron环境在ZIP创建部分已显示）
      if (!isElectron && successCount > 0) {
        showToast(`✅ 批量导出完成: ${successCount}/${tagsToExport.length}`);
      } else if (!isElectron && successCount === 0) {
        showToast(`⚠️ 导出失败，请检查控制台日志 (F12)`);
      }
    }
  </script>
</body>
</html>
