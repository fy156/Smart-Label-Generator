name: Build and Release EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
      
    - uses: actions/setup-node@v4
      with:
        node-version: '20'
        
    - name: Prepare for Electron Build
      shell: pwsh
      run: |
        # 删除 app/package.json 避免 Electron 检测冲突
        if (Test-Path app/package.json) { Remove-Item app/package.json -Force }
        if (Test-Path app/package.json.bak) { Remove-Item app/package.json.bak -Force }
        # 确保 dist 存在
        if (!(Test-Path app/dist/index.html)) {
          Write-Error "app/dist/index.html not found!"
          exit 1
        }
        Write-Host "Using pre-built frontend from app/dist"
      
    - name: Install Electron Dependencies
      run: |
        npm install
        npm install electron electron-builder --save-dev
      
    - name: Build EXE
      run: npx electron-builder --win --x64
      
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Smart-Label-Generator-Windows
        path: dist/*.exe
