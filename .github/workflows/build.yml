name: Build and Release EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
      
    - uses: actions/setup-node@v4
      with:
        node-version: '20'
        
    - name: Prepare for Electron Build
      shell: pwsh
      run: |
        if (Test-Path app/package.json) { Remove-Item app/package.json -Force }
        if (!(Test-Path app/dist/index.html)) {
          Write-Error "app/dist/index.html not found!"
          exit 1
        }
      
    - name: Install Electron Dependencies
      run: |
        npm install
        npm install electron electron-builder --save-dev
      
    - name: Build EXE
      env:
        GH_TOKEN: ${{ secrets.GH_TOKEN }}
      run: npx electron-builder --win --x64 --publish always
      
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Smart-Label-Generator-Windows
        path: dist/*.exe
