name: Build and Release EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
      
    - uses: actions/setup-node@v4
      with:
        node-version: '20'
        
    - name: Build Frontend
      shell: pwsh
      run: |
        cd app
        npm install
        ./node_modules/.bin/vite build
        cd ..
        if (Test-Path app/package.json) { Remove-Item app/package.json -Force }
      
    - name: Install Dependencies
      run: npm install
      
    - name: Build EXE
      run: npm run build:win
      
    - uses: actions/upload-artifact@v4
      with:
        name: Smart-Label-Generator-Windows
        path: dist/*.exe
